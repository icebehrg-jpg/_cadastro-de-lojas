<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ERP Kalunga | Gestão de Lojas</title>
    <!-- Bootstrap 5 + Icons + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <!-- Leaflet (mapa gratuito) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f7fc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 80%;
            max-width: 1400px;
            background: transparent;
        }

        @media (max-width: 1200px) {
            .dashboard-container {
                width: 95%;
            }
        }

        .top-bar-simple {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .top-bar-simple h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
            color: #1e2a3e;
        }

        .row-custom {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .card-custom {
            flex: 1;
            background: white;
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            border: 1px solid #e9edf2;
            transition: all 0.2s;
        }

        .card-custom:hover {
            background: #fefefe;
        }

        .card-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #5b7a9a;
            letter-spacing: 0.3px;
            margin-bottom: 0.4rem;
        }

        .card-number {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
            color: #1a2c3e;
        }

        .service-badges {
            display: flex;
            gap: 1rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }

        .service-item {
            background: #f0f3fa;
            border-radius: 30px;
            padding: 0.2rem 0.7rem;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .filters-bar {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid #e9edf2;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 140px;
        }

        .filter-group label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #5b7a9a;
            margin-bottom: 0.2rem;
            display: block;
        }

        .filter-group select,
        .filter-group input {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            border: 1px solid #dce3ec;
            width: 100%;
        }

        .btn-limpar {
            background: transparent;
            border: 1px solid #dce3ec;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
        }

        .table-wrapper {
            background: white;
            border-radius: 1rem;
            overflow-x: auto;
            border: 1px solid #e9edf2;
        }

        .table-kalunga {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .table-kalunga th {
            background: #f9fbfe;
            padding: 0.75rem 0.8rem;
            font-weight: 600;
            color: #2c3e66;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .table-kalunga th i {
            margin-left: 5px;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .table-kalunga td {
            padding: 0.7rem 0.8rem;
            border-bottom: 1px solid #f0f3fa;
            vertical-align: middle;
        }

        .table-kalunga tbody tr:hover {
            background-color: #f8fafd;
        }

        .badge-status {
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.7rem;
        }

        .badge-ativo {
            background: #e0f2e9;
            color: #1e6f5c;
        }

        .badge-inativo {
            background: #fee9e6;
            color: #b91c1c;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: #2c7da0;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-icon:hover {
            color: #1f5e7a;
            transform: scale(1.05);
        }

        /* Modal moderno responsivo */
        .modal-modern .modal-content {
            border-radius: 1.5rem;
            border: none;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
        }

        .modal-modern .modal-header {
            background: #ffffff;
            border-bottom: 1px solid #eef2fa;
            padding: 1rem 1.5rem;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-section-title {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5b7a9a;
            margin-bottom: 0.8rem;
            border-left: 3px solid #2c7da0;
            padding-left: 0.6rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.5rem 1rem;
        }

        .info-item {
            display: flex;
            border-bottom: 1px dashed #edf2f7;
            padding: 0.3rem 0;
            align-items: baseline;
        }

        .info-label {
            width: 110px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #5b7a9a;
            flex-shrink: 0;
        }

        .info-value {
            flex: 1;
            font-size: 0.8rem;
            color: #1e2f3e;
            word-break: break-word;
        }

        .horario-badge {
            background: #eef6ff;
            border-radius: 30px;
            padding: 0.2rem 0.7rem;
            font-size: 0.7rem;
            display: inline-block;
            margin-right: 0.5rem;
            margin-bottom: 0.3rem;
        }

        #modalMapView {
            height: 240px;
            width: 100%;
            border-radius: 1rem;
            background: #eef2f9;
            margin-top: 0.5rem;
        }

        .form-control-sm-custom {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            border: 1px solid #dce3ec;
            width: 100%;
        }

        @media (max-width: 768px) {
            .info-grid {
                grid-template-columns: 1fr;
            }

            .row-custom {
                flex-direction: column;
                gap: 0.8rem;
            }

            .info-label {
                width: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="top-bar-simple">
            <h2><i class="fas fa-store me-2"></i>Gestão de Lojas</h2>
            <div class="date"><i class="far fa-calendar-alt me-1"></i> <span id="dataAtual"></span></div>
        </div>

        <!-- Cards -->
        <div class="row-custom">
            <div class="card-custom">
                <div class="card-title"><i class="fas fa-check-circle me-1"></i> Lojas Ativas</div>
                <div class="card-number" id="cardAtivas">0</div>
                <div class="card-sub">Total em operação</div>
            </div>
            <div class="card-custom">
                <div class="card-title"><i class="fas fa-globe-americas me-1"></i> Cobertura</div>
                <div class="card-number" id="cardEstados">0</div>
                <div class="card-sub" id="cardCidadesRegioes">estados · 0 cidades · 0 regiões</div>
            </div>
            <div class="card-custom">
                <div class="card-title"><i class="fas fa-truck me-1"></i> Serviços</div>
                <div class="service-badges"><span class="service-item"><i class="fas fa-box"></i> Pickup: <span
                            id="pickupCount">0</span></span><span class="service-item"><i class="fas fa-motorcycle"></i>
                        Rappi: <span id="rappiCount">0</span></span><span class="service-item"><i
                            class="fas fa-mall"></i> Shopping: <span id="shoppingCount">0</span></span></div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters-bar">
            <div class="filter-group"><label>Status</label><select id="filterStatus">
                    <option value="all">Todos</option>
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                </select></div>
            <div class="filter-group"><label>Região</label><select id="filterRegiao">
                    <option value="all">Todas</option>
                    <option value="Sudeste">Sudeste</option>
                    <option value="Sul">Sul</option>
                    <option value="Centro-Oeste">Centro-Oeste</option>
                    <option value="Nordeste">Nordeste</option>
                    <option value="Norte">Norte</option>
                </select></div>
            <div class="filter-group"><label>Busca</label><input type="text" id="searchInput"
                    placeholder="Código, nome ou cidade"></div>
            <div class="filter-group" style="flex: 0.3;"><button id="btnLimpar" class="btn-limpar w-100"><i
                        class="fas fa-eraser"></i> Limpar</button></div>
        </div>

        <!-- Tabela -->
        <div class="table-wrapper">
            <table class="table-kalunga" id="lojasTable">
                <thead>
                    <tr>
                        <th data-col="CD_Filial">Código <i class="fas fa-sort"></i></th>
                        <th data-col="NomeSistema">Nome Loja <i class="fas fa-sort"></i></th>
                        <th data-col="NomeSite">Nome Conhecido <i class="fas fa-sort"></i></th>
                        <th data-col="EnderecoSimples">Endereço <i class="fas fa-sort"></i></th>
                        <th data-col="UF">UF <i class="fas fa-sort"></i></th>
                        <th data-col="Municipio">Cidade <i class="fas fa-sort"></i></th>
                        <th data-col="status">Status <i class="fas fa-sort"></i></th>
                        <th style="width: 50px;">Ver</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" class="text-center py-4">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL VISUALIZAÇÃO (moderno, responsivo, com botão editar) -->
    <div class="modal fade modal-modern" id="viewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="fas fa-building me-2"></i>Detalhes da Loja</h5><button
                        type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="viewModalBody"></div>
                <div class="modal-footer border-0"><button type="button" class="btn btn-sm btn-primary"
                        id="btnEditarDoModal">Editar Loja</button><button type="button" class="btn btn-sm btn-secondary"
                        data-bs-dismiss="modal">Fechar</button></div>
            </div>
        </div>
    </div>

    <!-- MODAL EDIÇÃO (mesmo do anterior) -->
    <div class="modal fade modal-modern" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="fas fa-edit me-2"></i>Editar Loja</h5><button
                        type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editId">
                        <div class="row g-2">
                            <div class="col-md-6"><label class="form-label small fw-semibold">Código
                                    Filial</label><input type="text" id="editCdFilial"
                                    class="form-control form-control-sm-custom" readonly></div>
                            <div class="col-md-6"><label class="form-label small fw-semibold">Nome Sistema</label><input
                                    type="text" id="editNomeSistema" class="form-control form-control-sm-custom"></div>
                            <div class="col-md-6"><label class="form-label small fw-semibold">Nome Conhecido (Nome
                                    Site)</label><input type="text" id="editNomeSite"
                                    class="form-control form-control-sm-custom"></div>
                            <div class="col-md-6"><label class="form-label small fw-semibold">CEP <i
                                        class="fas fa-search text-primary" id="buscarCepBtn"
                                        style="cursor:pointer;"></i></label><input type="text" id="editCep"
                                    class="form-control form-control-sm-custom" placeholder="Digite o CEP"></div>
                            <div class="col-md-6"><label class="form-label small fw-semibold">Endereço</label><input
                                    type="text" id="editEndereco" class="form-control form-control-sm-custom"></div>
                            <div class="col-md-3"><label class="form-label small fw-semibold">Município</label><input
                                    type="text" id="editMunicipio" class="form-control form-control-sm-custom"></div>
                            <div class="col-md-3"><label class="form-label small fw-semibold">UF</label><select
                                    id="editUf" class="form-select form-select-sm">
                                    <option value="SP">SP</option>
                                    <option value="RJ">RJ</option>
                                    <option value="MG">MG</option>
                                    <option value="BA">BA</option>
                                    <option value="RS">RS</option>
                                    <option value="PR">PR</option>
                                    <option value="SC">SC</option>
                                    <option value="GO">GO</option>
                                    <option value="DF">DF</option>
                                    <option value="PE">PE</option>
                                    <option value="CE">CE</option>
                                    <option value="AM">AM</option>
                                    <option value="PA">PA</option>
                                    <option value="MA">MA</option>
                                    <option value="RN">RN</option>
                                    <option value="ES">ES</option>
                                    <option value="MT">MT</option>
                                    <option value="MS">MS</option>
                                    <option value="PB">PB</option>
                                    <option value="PI">PI</option>
                                    <option value="AL">AL</option>
                                    <option value="SE">SE</option>
                                    <option value="RO">RO</option>
                                    <option value="TO">TO</option>
                                    <option value="AC">AC</option>
                                    <option value="AP">AP</option>
                                    <option value="RR">RR</option>
                                </select></div>
                            <div class="col-md-6"><label class="form-label small fw-semibold">Shopping</label><input
                                    type="text" id="editShopping" class="form-control form-control-sm-custom"></div>
                            <div class="col-md-6"><label class="form-label small fw-semibold">Status</label><select
                                    id="editStatus" class="form-select form-select-sm">
                                    <option value="Ativo">Ativo</option>
                                    <option value="Inativo">Inativo</option>
                                </select></div>
                            <div class="col-md-12"><label class="form-label small fw-semibold">Horário 01</label><input
                                    type="text" id="editHorario01" class="form-control form-control-sm-custom"></div>
                            <div class="col-md-12"><label class="form-label small fw-semibold">Horário 02</label><input
                                    type="text" id="editHorario02" class="form-control form-control-sm-custom"></div>
                            <div class="col-md-12"><label class="form-label small fw-semibold">Horário 03</label><input
                                    type="text" id="editHorario03" class="form-control form-control-sm-custom"></div>
                            <div class="col-md-4"><label class="form-label small fw-semibold">PickUp In
                                    Store</label><select id="editPickup" class="form-select form-select-sm">
                                    <option value="Sim">Sim</option>
                                    <option value="Não">Não</option>
                                </select></div>
                            <div class="col-md-4"><label class="form-label small fw-semibold">Ativo Rappi</label><select
                                    id="editRappi" class="form-select form-select-sm">
                                    <option value="Sim">Sim</option>
                                    <option value="Não">Não</option>
                                </select></div>
                            <div class="col-md-4"><label class="form-label small fw-semibold">Kiosque
                                    Pickup</label><select id="editKiosque" class="form-select form-select-sm">
                                    <option value="Sim">Sim</option>
                                    <option value="Não">Não</option>
                                </select></div>

                                    type="text" id="editLatitude" class="form-control form-control-sm-custom"></div>

                        data-bs-dismiss="modal">Cancelar</button><button type="button" id="btnSalvarEdicao"

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ================= CONFIGURAÇÃO =================
        const API_URL = "https://script.google.com/macros/s/AKfycbxHUV8v1m00g-NTluSifkzrfkxFiOfpnjGcg6AAzxNsgWIqPSxJTK7WV7l9c26qQrUr/exec";
        let lojasData = [], filteredData = [];
        let currentSort = { col: null, dir: 'asc' };
        let currentViewLoja = null; // guarda a loja sendo visualizada

        // Helper: extrair apenas rua+numero do endereço
        function getEnderecoSimples(loja) {
            let end = loja.Endereço || "";
            // remove possível complemento após vírgula? Mantém o que vier, mas sem shopping/CEP
            return end.split(" - ")[0].trim() || "Não informado";
        }

        function getEnderecoCompleto(loja) {
            let parts = [loja.Endereço, loja.Shopping ? `(${loja.Shopping})` : "", loja.CEP ? `CEP: ${loja.CEP}` : ""].filter(Boolean);
            return parts.join(" - ") || "Não informado";
        }

        function formatarHorario(horarioStr) {
            if (!horarioStr) return "";
            let str = horarioStr.replace(/Segunda à Sábado/g, "Segunda a Sábado");
            str = str.replace(/Domingos/g, "Domingo");
            str = str.replace(/das /g, "").replace(/às /g, "-");
            return str;
        }

        function getHorariosFormatados(loja) {
            let h1 = formatarHorario(loja.Horario01);
            let h2 = formatarHorario(loja.Horario02);
            let h3 = formatarHorario(loja.Horario03);
            let horarios = [h1, h2, h3].filter(h => h);
            return horarios.length ? horarios.join(" / ") : "Não informado";
        }

        // Carregar dados
        async function carregarLojas() {
            try {
                const resp = await fetch(API_URL);
                const data = await resp.json();
                if (data.success && Array.isArray(data.lojas)) {
                    lojasData = data.lojas;
                    aplicarFiltros();
                    atualizarCards();
                } else throw new Error(data.error);
            } catch (err) { tableBody.innerHTML = `<tr><td colspan="8" class="text-danger">Erro: ${err.message}</td></tr>`; }
        }

        function atualizarCards() {
            const ativas = lojasData.filter(l => l.status === "Ativo").length;
            document.getElementById("cardAtivas").innerText = ativas;
            const estados = new Set(lojasData.map(l => l.UF).filter(Boolean));
            const cidades = new Set(lojasData.map(l => `${l.Municipio}|${l.UF}`).filter(Boolean));
            const regioes = new Set(lojasData.map(l => l.regiao).filter(Boolean));
            document.getElementById("cardEstados").innerText = estados.size;
            document.getElementById("cardCidadesRegioes").innerHTML = `${estados.size} estados · ${cidades.size} cidades · ${regioes.size} regiões`;
            const pickup = lojasData.filter(l => l.PickUpInStore === "Sim").length;
            const rappi = lojasData.filter(l => l.AtivoRappi === "Sim").length;
            const shopping = lojasData.filter(l => l.Shopping && l.Shopping.trim() !== "").length;
            document.getElementById("pickupCount").innerText = pickup;
            document.getElementById("rappiCount").innerText = rappi;
            document.getElementById("shoppingCount").innerText = shopping;
        }

        function sortData(data, col, dir) {
            return [...data].sort((a, b) => {
                let valA, valB;
                if (col === 'EnderecoSimples') { valA = getEnderecoSimples(a); valB = getEnderecoSimples(b); }
                else if (col === 'NomeSite') { valA = a.NomeSite || ""; valB = b.NomeSite || ""; }
                else if (col === 'status') { valA = a.status; valB = b.status; }
                else { valA = a[col] || ""; valB = b[col] || ""; }
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return dir === 'asc' ? -1 : 1;
                if (valA > valB) return dir === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function renderizarTabela() {
            if (!filteredData.length) { tableBody.innerHTML = `<tr><td colspan="8" class="text-center">Nenhuma loja encontrada</td></tr>`; return; }
            let dataToRender = filteredData;
            if (currentSort.col) dataToRender = sortData(dataToRender, currentSort.col, currentSort.dir);
            let html = "";
            for (let loja of dataToRender) {
                const statusClass = loja.status === "Ativo" ? "badge-ativo" : "badge-inativo";
                html += `<tr>
                        <td class="fw-semibold">${loja.CD_Filial || "-"}</td>
                        <td>${loja.NomeSistema || "-"}</td>
                        <td>${loja.NomeSite || "-"}</td>
                        <td>${getEnderecoSimples(loja)}</td>
                        <td>${loja.UF || "-"}</td>
                        <td>${loja.Municipio || "-"}</td>
                        <td><span class="badge-status ${statusClass}">${loja.status}</span></td>
                        <td class="text-center"><button class="btn-icon" onclick="visualizarLoja('${loja.CD_Filial}')" title="Visualizar"><i class="fas fa-eye"></i></button></td>
                     </tr>`;
            }
            tableBody.innerHTML = html;
        }

        function aplicarFiltros() {
            let dados = [...lojasData];
            const status = document.getElementById("filterStatus").value;
            const regiao = document.getElementById("filterRegiao").value;
            const busca = document.getElementById("searchInput").value.toLowerCase().trim();
            if (status !== "all") dados = dados.filter(l => l.status === status);
            if (regiao !== "all") dados = dados.filter(l => l.regiao === regiao);
            if (busca) dados = dados.filter(l => (l.CD_Filial && l.CD_Filial.toString().includes(busca)) || (l.NomeSistema && l.NomeSistema.toLowerCase().includes(busca)) || (l.Municipio && l.Municipio.toLowerCase().includes(busca)));
            filteredData = dados;
            renderizarTabela();
        }

        // Visualização moderna com botão editar
        window.visualizarLoja = function (codigo) {
            const loja = lojasData.find(l => l.CD_Filial == codigo);
            if (!loja) return;
            currentViewLoja = loja;
            const horarios = getHorariosFormatados(loja);
            const modalBody = document.getElementById("viewModalBody");
            modalBody.innerHTML = `
            <div class="row">
                <div class="col-md-6">
                    <div class="detail-section"><div class="detail-section-title">Informações Gerais</div>
                        <div class="info-grid">
                            <div class="info-item"><div class="info-label">Código</div><div class="info-value">${loja.CD_Filial}</div></div>
                            <div class="info-item"><div class="info-label">Nome Loja</div><div class="info-value">${loja.NomeSistema}</div></div>
                            <div class="info-item"><div class="info-label">Nome Conhecido</div><div class="info-value">${loja.NomeSite || "-"}</div></div>
                            <div class="info-item"><div class="info-label">Status</div><div class="info-value"><span class="badge-status ${loja.status === 'Ativo' ? 'badge-ativo' : 'badge-inativo'}">${loja.status}</span></div></div>
                            <div class="info-item"><div class="info-label">Região</div><div class="info-value">${loja.regiao}</div></div>
                            <div class="info-item"><div class="info-label">Município/UF</div><div class="info-value">${loja.Municipio}/${loja.UF}</div></div>
                            <div class="info-item"><div class="info-label">Endereço</div><div class="info-value">${loja.Endereço || "-"}</div></div>
                            <div class="info-item"><div class="info-label">Shopping</div><div class="info-value">${loja.Shopping || "-"}</div></div>
                            <div class="info-item"><div class="info-label">CEP</div><div class="info-value">${loja.CEP || "-"}</div></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="detail-section"><div class="detail-section-title">Horários</div><div class="mb-2">${horarios.split("/").map(h => `<span class="horario-badge">${h.trim()}</span>`).join("")}</div></div>
                    <div class="detail-section"><div class="detail-section-title">Serviços</div>
                        <div class="info-grid">
                            <div class="info-item"><div class="info-label">PickUp In Store</div><div class="info-value">${loja.PickUpInStore === "Sim" ? "✅ Sim" : "❌ Não"}</div></div>
                            <div class="info-item"><div class="info-label">Ativo Rappi</div><div class="info-value">${loja.AtivoRappi === "Sim" ? "✅ Sim" : "❌ Não"}</div></div>
                            <div class="info-item"><div class="info-label">Kiosque Pickup</div><div class="info-value">${loja.Kiosque_Pickup === "Sim" ? "✅ Sim" : "❌ Não"}</div></div>
                            <div class="info-item"><div class="info-label">Entrega Loja</div><div class="info-value">${loja.Entrega_Loja === "Sim" ? "✅ Sim" : "❌ Não"}</div></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="detail-section"><div class="detail-section-title">Localização no Mapa</div><div id="modalMapView" style="height:240px; border-radius:1rem;"></div></div>
        `;
            const modal = new bootstrap.Modal(document.getElementById("viewModal"));
            modal.show();
            setTimeout(() => {
                const mapDiv = document.getElementById("modalMapView");
                if (mapDiv) {
                    const lat = parseFloat(loja.Latitude);
                    const lng = parseFloat(loja.Longitude);
                    let mapLat = -23.5505, mapLng = -46.6333, zoom = 12;
                    if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) { mapLat = lat; mapLng = lng; zoom = 15; }
                    const map = L.map(mapDiv).setView([mapLat, mapLng], zoom);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' }).addTo(map);
                    if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) L.marker([lat, lng]).addTo(map).bindPopup(loja.NomeSistema).openPopup();
                    else L.marker([mapLat, mapLng]).addTo(map).bindPopup("Localização aproximada").openPopup();
                    map.invalidateSize();
                }
            }, 200);
        };

        // Edição (preenche os campos)
        function abrirEdicao(loja) {
            document.getElementById("editId").value = loja.CD_Filial;
            document.getElementById("editCdFilial").value = loja.CD_Filial;
            document.getElementById("editNomeSistema").value = loja.NomeSistema || "";
            document.getElementById("editNomeSite").value = loja.NomeSite || "";
            document.getElementById("editCep").value = loja.CEP || "";
            document.getElementById("editEndereco").value = loja.Endereço || "";
            document.getElementById("editMunicipio").value = loja.Municipio || "";
            document.getElementById("editUf").value = loja.UF || "SP";
            document.getElementById("editShopping").value = loja.Shopping || "";
            document.getElementById("editStatus").value = loja.status === "Ativo" ? "Ativo" : "Inativo";
            document.getElementById("editHorario01").value = loja.Horario01 || "";
            document.getElementById("editHorario02").value = loja.Horario02 || "";
            document.getElementById("editHorario03").value = loja.Horario03 || "";
            document.getElementById("editPickup").value = loja.PickUpInStore === "Sim" ? "Sim" : "Não";
            document.getElementById("editRappi").value = loja.AtivoRappi === "Sim" ? "Sim" : "Não";
            document.getElementById("editKiosque").value = loja.Kiosque_Pickup === "Sim" ? "Sim" : "Não";
            document.getElementById("editLatitude").value = loja.Latitude || "";
            document.getElementById("editLongitude").value = loja.Longitude || "";
            new bootstrap.Modal(document.getElementById("editModal")).show();
        }

        document.getElementById("btnEditarDoModal").addEventListener("click", () => {
            bootstrap.Modal.getInstance(document.getElementById("viewModal")).hide();
            if (currentViewLoja) abrirEdicao(currentViewLoja);
        });

        // Busca CEP
        document.getElementById("buscarCepBtn").addEventListener("click", async () => {
            const cep = document.getElementById("editCep").value.replace(/\D/g, "");
            if (cep.length !== 8) { alert("CEP inválido (8 dígitos)"); return; }
            try {
                const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await resp.json();
                if (data.erro) throw new Error("CEP não encontrado");
                document.getElementById("editEndereco").value = `${data.logradouro}, ${data.bairro}`;
                document.getElementById("editMunicipio").value = data.localidade;
                document.getElementById("editUf").value = data.uf;
            } catch (err) { alert("Erro ao buscar CEP: " + err.message); }
        });

        // Salvar edição (local)
        document.getElementById("btnSalvarEdicao").addEventListener("click", () => {
            const codigo = document.getElementById("editId").value;
            const index = lojasData.findIndex(l => l.CD_Filial == codigo);
            if (index !== -1) {
                lojasData[index] = {
                    ...lojasData[index],
                    NomeSistema: document.getElementById("editNomeSistema").value,
                    NomeSite: document.getElementById("editNomeSite").value,
                    CEP: document.getElementById("editCep").value,
                    Endereço: document.getElementById("editEndereco").value,
                    Municipio: document.getElementById("editMunicipio").value,
                    UF: document.getElementById("editUf").value,
                    Shopping: document.getElementById("editShopping").value,
                    status: document.getElementById("editStatus").value,
                    Horario01: document.getElementById("editHorario01").value,
                    Horario02: document.getElementById("editHorario02").value,
                    Horario03: document.getElementById("editHorario03").value,
                    PickUpInStore: document.getElementById("editPickup").value,
                    AtivoRappi: document.getElementById("editRappi").value,
                    Kiosque_Pickup: document.getElementById("editKiosque").value,
                    Latitude: document.getElementById("editLatitude").value,
                    Longitude: document.getElementById("editLongitude").value,
                };
                lojasData[index].regiao = mapearRegiao(lojasData[index].UF);
                atualizarCards();
                aplicarFiltros();
                alert("Loja atualizada localmente. Para persistir no Google Sheets, integre com backend POST.");
            }
            bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
        });

        function mapearRegiao(uf) {
            const sudeste = ["SP", "RJ", "MG", "ES"]; const sul = ["PR", "SC", "RS"]; const centroeste = ["DF", "GO", "MT", "MS"]; const nordeste = ["BA", "SE", "AL", "PE", "PB", "RN", "CE", "PI", "MA"]; const norte = ["AM", "RR", "AP", "PA", "TO", "RO", "AC"];
            if (sudeste.includes(uf)) return "Sudeste";
            if (sul.includes(uf)) return "Sul";
            if (centroeste.includes(uf)) return "Centro-Oeste";
            if (nordeste.includes(uf)) return "Nordeste";
            if (norte.includes(uf)) return "Norte";
            return "Outra";
        }

        // Ordenação
        function setupSorting() {
            const ths = document.querySelectorAll("#lojasTable th[data-col]");
            ths.forEach(th => {
                th.addEventListener("click", () => {
                    const col = th.getAttribute("data-col");
                    if (currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
                    else { currentSort.col = col; currentSort.dir = 'asc'; }
                    renderizarTabela();
                    ths.forEach(t => { let icon = t.querySelector("i"); icon.className = (t.getAttribute("data-col") === currentSort.col && currentSort.dir === 'asc') ? "fas fa-sort-up" : (t.getAttribute("data-col") === currentSort.col && currentSort.dir === 'desc') ? "fas fa-sort-down" : "fas fa-sort"; });
                });
            });
        }

        document.getElementById("filterStatus").addEventListener("change", aplicarFiltros);
        document.getElementById("filterRegiao").addEventListener("change", aplicarFiltros);
        document.getElementById("searchInput").addEventListener("keyup", aplicarFiltros);
        document.getElementById("btnLimpar").addEventListener("click", () => { document.getElementById("filterStatus").value = "all"; document.getElementById("filterRegiao").value = "all"; document.getElementById("searchInput").value = ""; aplicarFiltros(); });
        document.getElementById("dataAtual").innerText = new Date().toLocaleDateString("pt-BR");

        carregarLojas().then(setupSorting);
    </script>
</body>

</html>
